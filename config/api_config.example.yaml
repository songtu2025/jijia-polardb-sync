      page_size: 100
      list_field: data.list
      total_field: data.total
    primary_key:
      field: productId
      required: false
    date_field: updatedAt
    rate_limit:
      sleep_seconds: 1
    params: {}

  # 已接入的真实示例接口：用于验证 token、分页、入库和日志链路。
  - api_code: amazon_shop_page
    name: 查询亚马逊店铺信息
    enabled: true
    method: POST
    path: /middle/base/market/page
    page:
      # max_pages 是接入阶段保护值，避免分页字段配置错误时无限请求。
      enabled: true
      page_no_field: page
      page_size_field: pagesize
      page_size: 20
      max_pages: 5
      list_field: data.rows
      total_field: data.total
    primary_key:
      field: ""
      required: false
    date_field: ""
    rate_limit:
      sleep_seconds: 1
    retry:
      retries: 3
      delay_seconds: 1
    params:
      page: 1
      pagesize: 20
      condition: {}

